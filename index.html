<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #1a1a1d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #4e4e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .desc {
            color: #aaa;
            margin-bottom: 30px;
            max-width: 500px;
        }
        .links a {
            display: inline-block;
            margin: 8px 12px;
            padding: 10px 20px;
            background: #6a6a6a;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .links a:hover {
            background: #00adb5;
        }
        footer {
            margin-top: 50px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="avatar">👤</div>
    <h1>我的个人主页</h1>
    <p class="desc">热爱技术、喜欢分享、简单干净的个人小站</p>

    <div class="links">
        <a href="https://github.com/">GitHub</a>
        <a href="https://space.bilibili.com/">B站</a>
        <a href="mailto:your@email.com">邮箱</a>
    </div>

    <footer>© 2026 My Personal Website</footer>

</body>
</html>
